
<style>
#erd-wrap svg { width: 100%; height: auto; }
#erd-wrap { padding: 0.5rem 0; }
</style>
<div id="erd-wrap"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f0f0ec',
    primaryBorderColor: dark ? '#5f5e5a' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  CATEGORIES {
    int id PK
    string name
    string icon
    string description
  }

  PLACES {
    int id PK
    int category_id FK
    string name
    decimal latitude
    decimal longitude
    string address
    text description
    string phone
    string website
    string open_hours
    float rating_avg
    string photo_url
    string streetview_url
    timestamp created_at
    timestamp updated_at
  }

  PHOTOS {
    int id PK
    int place_id FK
    int user_id FK
    string url
    string source
    timestamp uploaded_at
  }

  USERS {
    int id PK
    string name
    string email
    string password_hash
    string role
    timestamp created_at
  }

  REVIEWS {
    int id PK
    int place_id FK
    int user_id FK
    int rating
    text comment
    timestamp created_at
  }

  FAVORITES {
    int id PK
    int user_id FK
    int place_id FK
    timestamp saved_at
  }

  CATEGORIES ||--o{ PLACES : "has"
  PLACES ||--o{ PHOTOS : "has"
  PLACES ||--o{ REVIEWS : "receives"
  PLACES ||--o{ FAVORITES : "saved in"
  USERS ||--o{ REVIEWS : "writes"
  USERS ||--o{ FAVORITES : "saves"
  USERS ||--o{ PHOTOS : "uploads"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd-wrap').innerHTML = svg;

document.querySelectorAll('#erd-wrap svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd-wrap svg .row-rect-odd path, #erd-wrap svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
