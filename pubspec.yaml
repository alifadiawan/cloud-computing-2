name: cloud_computing_2
description: "Cloud Computing Android Map Directory"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.1.0

  # State Management
  provider: ^6.1.5

  # Google Maps
  google_maps_flutter: ^2.12.3

  # GPS & Permission
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # Open Route / Google Maps
  url_launcher: ^6.3.2
  http: ^1.2.1

  # Image Cache
  cached_network_image: ^3.4.1

  # Loading Animation
  flutter_spinkit: ^5.2.1

  # OpenStreetMap
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.1
  geolocator_platform_interface: ^4.2.8

flutter:
  uses-material-design: true